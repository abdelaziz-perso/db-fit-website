name: CI / CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  ci:
    name: Lint and Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          NEXT_PUBLIC_SITE_URL: https://fitnessdarbouazza.ma
        run: npm run build

  deploy:
    name: Deploy to Hostinger (FTP)
    needs: ci
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        env:
          # Canonical / sitemap / robots / Open Graph — doit matcher l’URL publique (www vs apex)
          NEXT_PUBLIC_SITE_URL: https://fitnessdarbouazza.ma
          # Optionnel : meta google-site-verification (sinon le fichier public/google….html suffit)
          # NEXT_PUBLIC_GOOGLE_SITE_VERIFICATION: ${{ secrets.GOOGLE_SITE_VERIFICATION }}
        run: npm run build

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USERNAME }}
          password: ${{ secrets.HOSTINGER_PASSWORD }}
          port: ${{ secrets.HOSTINGER_PORT }}
          server-dir: ${{ secrets.HOSTINGER_SERVER_DIR }}
          local-dir: ./out/
          # Ne pas vider le serveur avant upload : évite fenêtre où .htaccess / _next
          # manquent si l’upload est partiel. `public/.htaccess` est copié dans out/ au build.
          # SamKirkland/FTP-Deploy-Action v4 n’a pas d’input `clean` : synchro incrémentale
          # (état déployé) = upload des fichiers modifiés + suppression des fichiers retirés du build.
          dangerous-clean-slate: false
